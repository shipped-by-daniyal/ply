name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Token lint + build
        run: pnpm --filter @ply/tokens build
      - name: dist matches src (committed output is current)
        run: git diff --exit-code packages/tokens/dist
      - name: Token reference docs are current
        run: node scripts/gen-token-docs.mjs && git diff --exit-code apps/docs/src/content/docs/tokens
      - name: Docs build
        run: pnpm --filter docs build
      - name: Docs links resolve (existence + base prefix + anchors)
        run: node scripts/check-links.mjs
